name: Generate Blog Post

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate and publish blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_blog.py

      - name: Commit and push
        run: |
          git config --global user.name "ProLink Blog Bot"
          git config --global user.email "blog-bot@prolinksystems.com"
          git add blog/
          git diff --staged --quiet || git commit -m "Auto-generate blog post $(date +'%B %Y')"
          git push
