name: Generate Blog Post

on:
  schedule:
    # Every other day at 16:00 UTC = ~9 AM Los Angeles (8 AM PST / 9 AM PDT),
    # a strong window for LinkedIn engagement. Temporary high-frequency cadence;
    # revert to '0 16 1 * *' for once-a-month.
    - cron: '0 16 */2 * *'
  workflow_dispatch:
    inputs:
      topic_index:
        description: 'Topic index (0-29). Leave empty for auto-rotation.'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate and publish blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC_INDEX: ${{ github.event.inputs.topic_index }}
          # LinkedIn auto-post (see LINKEDIN_SETUP.md). If these are unset the
          # blog still publishes normally -- the LinkedIn step just no-ops.
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
          LINKEDIN_API_VERSION: ${{ secrets.LINKEDIN_API_VERSION }}
        run: python generate_blog.py

      - name: Commit and push
        run: |
          git config --global user.name "ProLink Blog Bot"
          git config --global user.email "blog-bot@prolinksystems.com"
          git add blog/ sitemap.xml index.html
          git diff --staged --quiet || git commit -m "Auto-generate blog post $(date +'%Y-%m-%d')"
          git push
